<!-- 
  PDF Converter Pro 应用图标占位符
  🎨 橙影【设计】
  
  建议替换为实际的 SVG 或 PNG 图标
  推荐尺寸：256x256, 512x512
-->
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- 背景 -->
  <rect width="256" height="256" rx="60" fill="#6c5ce7"/>
  
  <!-- PDF 图标 -->
  <rect x="60" y="50" width="136" height="156" rx="10" fill="#ffffff"/>
  <text x="128" y="155" font-family="Arial" font-size="60" font-weight="bold" fill="#6c5ce7" text-anchor="middle">PDF</text>
  
  <!-- 转换箭头 -->
  <path d="M 180 128 L 220 128 L 210 118 M 220 128 L 210 138" 
        stroke="#00b894" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- WORD 图标 -->
  <rect x="40" y="180" width="100" height="50" rx="8" fill="#0984e3"/>
  <text x="90" y="215" font-family="Arial" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">WORD</text>
  
  <!-- 装饰元素 -->
  <circle cx="200" cy="60" r="15" fill="#00b894" opacity="0.8"/>
  <circle cx="50" cy="200" r="10" fill="#fdcb6e" opacity="0.8"/>
</svg>
