<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦎 PDF Converter Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 32px; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 14px; }
        .content { padding: 30px; }
        
        /* 文件选择区 */
        .file-section {
            border: 3px dashed #dfe6e9;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            margin-bottom: 25px;
            transition: all 0.3s;
            cursor: pointer;
        }
        .file-section:hover {
            border-color: #6c5ce7;
            background: #f8f9ff;
        }
        .file-section.dragover {
            border-color: #6c5ce7;
            background: #f0f0ff;
        }
        .file-icon { font-size: 64px; margin-bottom: 15px; }
        .file-text { font-size: 18px; color: #2d3436; font-weight: bold; }
        .file-hint { color: #636e72; font-size: 14px; margin-top: 10px; }
        #fileInput { display: none; }
        
        /* 选项区 */
        .options-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
        }
        .option-group { margin-bottom: 20px; }
        .option-group:last-child { margin-bottom: 0; }
        .option-title {
            font-size: 16px;
            font-weight: bold;
            color: #2d3436;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 12px;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .checkbox-item:hover { background: #e8e8ff; }
        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .select-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
        }
        .select-item {
            background: white;
            padding: 10px;
            border-radius: 8px;
        }
        .select-item label {
            display: block;
            font-size: 13px;
            color: #636e72;
            margin-bottom: 5px;
        }
        .select-item select, .select-item input {
            width: 100%;
            padding: 8px;
            border: 1px solid #dfe6e9;
            border-radius: 6px;
            font-size: 14px;
        }
        
        /* 按钮区 */
        .button-section {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }
        .btn {
            flex: 1;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(108,92,231,0.4); }
        .btn-primary:disabled { background: #b2bec3; cursor: not-allowed; transform: none; }
        .btn-secondary {
            background: #dfe6e9;
            color: #2d3436;
        }
        .btn-secondary:hover { background: #b2bec3; }
        
        /* 进度区 */
        .progress-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            display: none;
        }
        .progress-section.show { display: block; }
        .progress-bar {
            height: 25px;
            background: #dfe6e9;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 15px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #6c5ce7, #a29bfe);
            width: 0%;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 13px;
            font-weight: bold;
        }
        .progress-text { color: #636e72; font-size: 14px; text-align: center; }
        
        /* 日志区 */
        .log-section {
            background: #2d3436;
            color: #dfe6e9;
            border-radius: 15px;
            padding: 20px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
        }
        .log-entry { margin-bottom: 5px; }
        .log-info { color: #74b9ff; }
        .log-success { color: #55efc4; }
        .log-error { color: #ff7675; }
        .log-warning { color: #ffeaa7; }
        
        /* 文件列表 */
        .file-list {
            margin-top: 15px;
            max-height: 150px;
            overflow-y: auto;
        }
        .file-item {
            display: flex;
            align-items: center;
            padding: 10px;
            background: white;
            border-radius: 8px;
            margin-bottom: 8px;
            gap: 10px;
        }
        .file-icon-small { font-size: 24px; }
        .file-name { flex: 1; font-size: 14px; color: #2d3436; word-break: break-all; }
        .file-status { font-size: 12px; padding: 4px 8px; border-radius: 4px; white-space: nowrap; }
        .status-pending { background: #dfe6e9; color: #636e72; }
        .status-processing { background: #74b9ff; color: white; }
        .status-success { background: #55efc4; color: white; }
        .status-error { background: #ff7675; color: white; }
        .remove-btn {
            background: none;
            border: none;
            color: #ff7675;
            cursor: pointer;
            font-size: 18px;
            padding: 0 5px;
        }
        .remove-btn:hover { color: #d63031; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🦎 PDF Converter Pro</h1>
            <p>PDF 转 WORD · OCR 识别 · 去水印处理</p>
        </div>
        
        <div class="content">
            <!-- 文件选择区 -->
            <div class="file-section" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <div class="file-icon">📥</div>
                <div class="file-text">点击或拖拽文件到此处</div>
                <div class="file-hint">支持 PDF、PNG、JPG 等格式，支持批量选择</div>
                <input type="file" id="fileInput" multiple accept=".pdf,.png,.jpg,.jpeg">
            </div>
            
            <!-- 文件列表 -->
            <div class="file-list" id="fileList"></div>
            
            <!-- 选项区 -->
            <div class="options-section">
                <div class="option-group">
                    <div class="option-title">🛠️ 处理功能</div>
                    <div class="checkbox-group">
                        <label class="checkbox-item">
                            <input type="checkbox" id="chkWatermark"> 去水印
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" id="chkOCR"> OCR 识别（转可搜索 PDF）
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" id="chkWord"> 转 WORD（可编辑文字）
                        </label>
                    </div>
                </div>
                
                <div class="option-group">
                    <div class="option-title">⚙️ 高级选项</div>
                    <div class="select-group">
                        <div class="select-item">
                            <label>OCR 引擎</label>
                            <select id="selOcrEngine">
                                <option value="ocrmypdf" selected>OCRmyPDF（推荐）</option>
                                <option value="tesseract">Tesseract</option>
                                <option value="paddleocr">PaddleOCR</option>
                            </select>
                        </div>
                        <div class="select-item">
                            <label>WORD 转换方法</label>
                            <select id="selWordMethod">
                                <option value="pdf2docx" selected>pdf2docx（稳定）</option>
                                <option value="paddleocr">PaddleOCR（复杂布局）</option>
                            </select>
                        </div>
                        <div class="select-item" style="grid-column: span 2;">
                            <label>输出目录</label>
                            <input type="text" id="inpOutput" value="D:\测试" placeholder="例如：D:\测试">
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 按钮区 -->
            <div class="button-section">
                <button class="btn btn-primary" id="btnStart" onclick="startProcessing()">▶️ 开始处理</button>
                <button class="btn btn-secondary" id="btnStop" onclick="stopProcessing()" disabled>⏹️ 停止</button>
            </div>
            
            <!-- 进度区 -->
            <div class="progress-section" id="progressSection">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill">0%</div>
                </div>
                <div class="progress-text" id="progressText">准备中...</div>
            </div>
            
            <!-- 日志区 -->
            <div class="log-section" id="logSection">
                <div class="log-entry log-info">👋 欢迎使用 PDF Converter Pro！</div>
                <div class="log-entry log-info">💡 提示：选择文件后点击"开始处理"</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';
        let selectedFiles = [];
        let isProcessing = false;
        let statusInterval = null;
        
        // 拖拽事件
        const dropZone = document.getElementById('dropZone');
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });
        
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = Array.from(e.dataTransfer.files);
            addFiles(files);
        });
        
        document.getElementById('fileInput').addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            addFiles(files);
        });
        
        function addFiles(files) {
            const validFiles = files.filter(f => 
                ['.pdf', '.png', '.jpg', '.jpeg'].includes(f.name.slice(-4).toLowerCase())
            );
            
            selectedFiles = [...selectedFiles, ...validFiles.map(f => ({
                file: f,
                name: f.name,
                size: f.size,
                status: 'pending'
            }))];
            
            renderFileList();
            addLog(`📄 已添加 ${validFiles.length} 个文件`, 'info');
        }
        
        function renderFileList() {
            const list = document.getElementById('fileList');
            list.innerHTML = selectedFiles.map((f, i) => `
                <div class="file-item">
                    <span class="file-icon-small">📄</span>
                    <span class="file-name">${f.name}</span>
                    <span class="file-status status-${f.status}">${getStatusText(f.status)}</span>
                    ${!isProcessing ? `<button class="remove-btn" onclick="removeFile(${i})">×</button>` : ''}
                </div>
            `).join('');
        }
        
        function getStatusText(status) {
            const map = {
                'pending': '等待中',
                'processing': '处理中',
                'success': '成功',
                'error': '失败'
            };
            return map[status] || status;
        }
        
        function removeFile(index) {
            selectedFiles.splice(index, 1);
            renderFileList();
        }
        
        function addLog(message, type = 'info') {
            const log = document.getElementById('logSection');
            const time = new Date().toLocaleTimeString();
            log.innerHTML += `<div class="log-entry log-${type}">[${time}] ${message}</div>`;
            log.scrollTop = log.scrollHeight;
        }
        
        async function startProcessing() {
            if (selectedFiles.length === 0) {
                alert('请先选择文件！');
                return;
            }
            
            const options = {
                watermark: document.getElementById('chkWatermark').checked,
                ocr: document.getElementById('chkOCR').checked,
                word: document.getElementById('chkWord').checked,
                ocr_engine: document.getElementById('selOcrEngine').value,
                word_method: document.getElementById('selWordMethod').value,
                output_dir: document.getElementById('inpOutput').value
            };
            
            if (!options.watermark && !options.ocr && !options.word) {
                alert('请至少选择一个处理功能！');
                return;
            }
            
            isProcessing = true;
            document.getElementById('btnStart').disabled = true;
            document.getElementById('btnStop').disabled = false;
            document.getElementById('progressSection').classList.add('show');
            
            // 更新文件状态
            selectedFiles.forEach(f => f.status = 'processing');
            renderFileList();
            
            addLog('🚀 开始处理...', 'info');
            addLog(`📊 文件数：${selectedFiles.length}`, 'info');
            addLog(`📁 输出目录：${options.output_dir}`, 'info');
            addLog(`⚙️ 选项：OCR (${options.ocr_engine}) + WORD (${options.word_method})`, 'info');
            
            // 创建 FormData
            const formData = new FormData();
            selectedFiles.forEach(f => {
                formData.append('files', f.file);
            });
            formData.append('watermark', options.watermark);
            formData.append('ocr', options.ocr);
            formData.append('word', options.word);
            formData.append('ocr_engine', options.ocr_engine);
            formData.append('word_method', options.word_method);
            formData.append('output_dir', options.output_dir);
            
            try {
                const response = await fetch(`${API_BASE}/api/process`, {
                    method: 'POST',
                    body: formData
                });
                
                // 检查响应类型
                const contentType = response.headers.get('content-type');
                if (!contentType || !contentType.includes('application/json')) {
                    const text = await response.text();
                    throw new Error(`服务器返回非 JSON 响应: ${text.substring(0, 100)}`);
                }
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || `HTTP ${response.status}: 处理失败`);
                }
                
                addLog(`✅ ${data.message}`, 'success');
                addLog(`📁 输出目录：${data.output_dir}`, 'success');
                
                // 开始轮询状态
                startStatusPolling();
                
            } catch (error) {
                addLog(`❌ 错误：${error.message}`, 'error');
                isProcessing = false;
                document.getElementById('btnStart').disabled = false;
                document.getElementById('btnStop').disabled = true;
                selectedFiles.forEach(f => f.status = 'error');
                renderFileList();
            }
        }
        
        function startStatusPolling() {
            statusInterval = setInterval(async () => {
                try {
                    const response = await fetch(`${API_BASE}/api/status`);
                    const status = await response.json();
                    
                    // 更新进度
                    document.getElementById('progressFill').style.width = status.progress + '%';
                    document.getElementById('progressFill').textContent = status.progress + '%';
                    document.getElementById('progressText').textContent = status.message || '处理中...';
                    
                    // 更新日志
                    if (status.logs && status.logs.length > 0) {
                        const lastLog = status.logs[status.logs.length - 1];
                        addLog(`${lastLog.message}`, lastLog.level);
                    }
                    
                    // 检查是否完成
                    if (!status.is_processing) {
                        finishProcessing(status);
                    }
                    
                } catch (error) {
                    console.error('状态轮询失败:', error);
                }
            }, 1000);
        }
        
        function finishProcessing(status) {
            clearInterval(statusInterval);
            isProcessing = false;
            document.getElementById('btnStart').disabled = false;
            document.getElementById('btnStop').disabled = true;
            
            // 更新文件状态
            selectedFiles.forEach(f => {
                f.status = status.success_count > 0 ? 'success' : 'error';
            });
            renderFileList();
            
            addLog(`🎉 全部完成！成功：${status.success_count}, 失败：${status.fail_count}`, 'success');
            addLog('✅ 处理完成', 'success');
        }
        
        async function stopProcessing() {
            try {
                await fetch(`${API_BASE}/api/stop`, { method: 'POST' });
                addLog('⏹️ 已停止处理', 'warning');
            } catch (error) {
                addLog(`停止失败：${error.message}`, 'error');
            }
        }
    </script>
</body>
</html>
